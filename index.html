<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏸 Badminton Pro Coach V4</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #060d1a; --surface: #0c1628; --card: #111e35; --border: #1c2e4a;
    --cyan: #00e5ff; --orange: #ff6b35; --green: #00ff88; --red: #ff3d5a; --text: #ddeeff; --muted: #3a5070;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
  
  #header { padding: 15px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  #options { padding: 10px 15px; background: var(--card); display: flex; align-items: center; gap: 10px; font-size: 13px; }
  select { background: var(--surface); color: var(--cyan); border: 1px solid var(--border); padding: 5px; border-radius: 5px; outline: none; }

  #cam-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; overflow: hidden; }
  video, #replay-video { width: 100%; height: 100%; object-fit: cover; }
  #skeleton-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  
  #countdown { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); color: white; font-size: 80px; font-weight: 900; z-index: 10; }
  #timer-badge { position: absolute; top: 10px; right: 15px; background: var(--red); color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; display: none; z-index: 5; }
  #replay-label { position: absolute; top: 10px; left: 12px; background: var(--orange); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; display: none; z-index: 5; }

  #result-summary { padding: 15px; background: var(--surface); margin: 10px 15px; border-radius: 12px; border: 1px solid var(--border); display: none; }
  .score-title { font-size: 18px; font-weight: 800; color: #ffd234; margin-bottom: 10px; text-align: center; }
  .check-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px dashed var(--border); }
  .check-item.success { color: var(--green); }
  .check-item.fail { color: var(--muted); }

  #btn-main { margin: 10px 15px 30px; height: 65px; border-radius: 15px; border: none; background: linear-gradient(135deg, var(--cyan), #0099bb); font-size: 18px; font-weight: 800; cursor: pointer; color: #001a22; }
  #btn-main.rec { background: var(--red); color: white; }
</style>
</head>
<body>

<div id="header">
  <div style="font-weight: 800; color: var(--cyan);">🏸 BADMINTON ANALYZER</div>
  <div id="status-dot" style="font-size: 11px; color: var(--muted);">● STANDBY</div>
</div>

<div id="options">
  주사용 손: 
  <select id="hand-select">
    <option value="right">오른손잡이 (Right)</option>
    <option value="left">왼손잡이 (Left)</option>
  </select>
</div>

<div id="cam-wrap">
  <div id="countdown">3</div>
  <div id="timer-badge">REC 10s</div>
  <div id="replay-label">SLOW REPLAY (0.5x)</div>
  <video id="video" playsinline muted autoplay></video>
  <video id="replay-video" playsinline loop></video>
  <svg id="skeleton-svg" viewBox="0 0 640 480"></svg>
</div>

<div id="result-summary">
  <div class="score-title" id="final-score">분석 결과: 0/4</div>
  <div id="check-list">
    <div class="check-item" id="c1">1. 팔꿈치 리드 스윙 <span>-</span></div>
    <div class="check-item" id="c2">2. 임팩트 시 정면 유지 <span>-</span></div>
    <div class="check-item" id="c3">3. 최고 타점 히팅 <span>-</span></div>
    <div class="check-item" id="c4">4. 반대 손 활용(작용-반작용) <span>-</span></div>
  </div>
</div>

<button id="btn-main" onclick="handleStart()">측정 시작</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script>
let pose, mediaRecorder, chunks = [];
let isRecording = false, isReplaying = false;
let analysis = { elbowLead:false, faceFront:false, maxExtension:false, oppositeHand:false };

const video = document.getElementById('video');
const replayVid = document.getElementById('replay-video');
const btn = document.getElementById('btn-main');
const countdownEl = document.getElementById('countdown');

async function init() {
  const stream = await navigator.mediaDevices.getUserMedia({ 
    video: { facingMode: "environment", width: 640, height: 480 } 
  });
  video.srcObject = stream;

  pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  pose.onResults(onResults);

  // ── 핵심 루프: 리플레이 중에도 포즈 전송 ──
  const run = async () => { 
    const source = isReplaying ? replayVid : video;
    if (source.readyState >= 2) {
      await pose.send({ image: source }); 
    }
    requestAnimationFrame(run); 
  };
  
  video.onloadedmetadata = () => {
    document.getElementById('status-dot').style.color = 'var(--green)';
    run();
  };
}

function onResults(res) {
  if (!res.poseLandmarks) return;
  draw(res.poseLandmarks);
  if (isRecording) checkSwing(res.poseLandmarks);
}

function checkSwing(lm) {
  const hand = document.getElementById('hand-select').value;
  const side = hand === 'right' ? {s:12, e:14, w:16} : {s:11, e:13, w:15};
  const oppWrist = hand === 'right' ? 15 : 16;

  const s = lm[side.s], e = lm[side.e], w = lm[side.w], ow = lm[oppWrist];

  if (e.y < s.y && e.x > w.x) analysis.elbowLead = true;
  if (Math.abs(w.x - s.x) < 0.12 && w.y < s.y) analysis.faceFront = true;
  const ext = Math.sqrt(Math.pow(w.x-s.x,2) + Math.pow(w.y-s.y,2));
  if (ext > 0.28) analysis.maxExtension = true;
  if (ow.y < lm[11].y || ow.y < lm[12].y) analysis.oppositeHand = true;
}

function handleStart() {
  if (isReplaying) return location.reload();
  
  let count = 3;
  countdownEl.style.display = 'flex';
  btn.disabled = true;

  const timer = setInterval(() => {
    count--;
    countdownEl.textContent = count;
    if (count === 0) {
      clearInterval(timer);
      countdownEl.style.display = 'none';
      startRec();
    }
  }, 1000);
}

function startRec() {
  isRecording = true;
  chunks = [];
  analysis = { elbowLead:false, faceFront:false, maxExtension:false, oppositeHand:false };
  
  mediaRecorder = new MediaRecorder(video.srcObject);
  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = showResult;
  mediaRecorder.start();
  
  btn.disabled = false;
  btn.textContent = "녹화 중 (10초)...";
  btn.classList.add('rec');
  document.getElementById('timer-badge').style.display = 'block';
  
  setTimeout(() => { if(isRecording) mediaRecorder.stop(); isRecording = false; }, 10000);
}

function showResult() {
  const blob = new Blob(chunks, { type: 'video/webm' });
  replayVid.src = URL.createObjectURL(blob);
  
  isReplaying = true;
  video.style.display = 'none';
  replayVid.style.display = 'block';
  replayVid.playbackRate = 0.5;
  replayVid.play();
  
  btn.textContent = "다시 측정하기";
  btn.classList.remove('rec');
  document.getElementById('timer-badge').style.display = 'none';
  document.getElementById('replay-label').style.display = 'block';
  document.getElementById('result-summary').style.display = 'block';
  
  const score = [analysis.elbowLead, analysis.faceFront, analysis.maxExtension, analysis.oppositeHand].filter(Boolean).length;
  document.getElementById('final-score').textContent = `분석 결과: ${score}/4`;
  [analysis.elbowLead, analysis.faceFront, analysis.maxExtension, analysis.oppositeHand].forEach((res, i) => {
    const el = document.getElementById(`c${i+1}`);
    el.className = res ? 'check-item success' : 'check-item fail';
    el.querySelector('span').textContent = res ? '성공' : '미흡';
  });
}

function draw(lm) {
  const svg = document.getElementById('skeleton-svg');
  svg.innerHTML = "";
  const pts = lm.map(l => ({ x: l.x * 640, y: l.y * 480 }));
  const connections = [[11,12],[12,14],[14,16],[11,13],[13,15]];
  connections.forEach(([a, b]) => {
    const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
    l.setAttribute("x1", pts[a].x); l.setAttribute("y1", pts[a].y);
    l.setAttribute("x2", pts[b].x); l.setAttribute("y2", pts[b].y);
    l.setAttribute("stroke", "#00e5ff"); l.setAttribute("stroke-width", "5");
    svg.appendChild(l);
  });
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏸 AI Swing Coach Pro V10</title>
<style>
  /* 스타일은 V9의 레이아웃을 유지하되 가독성을 더욱 높였습니다 */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #050a15; --surface: #0c1628; --card: #111e35; --border: #1c2e4a;
    --cyan: #00e5ff; --orange: #ff6b35; --green: #00ff88; --red: #ff3d5a; --text: #ddeeff; --muted: #4a5d7a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #header { padding: 10px; background: var(--surface); text-align: center; border-bottom: 2px solid var(--border); }
  #header h1 { font-size: 16px; color: var(--cyan); text-transform: uppercase; }
  #main-layout { position: relative; flex: 1; width: 100%; display: flex; flex-direction: column; overflow: hidden; }
  #cam-section { position: relative; flex: 1.2; background: #000; display: flex; align-items: center; justify-content: center; }
  video, #replay-video { width: 100%; height: 100%; object-fit: contain; }
  #skeleton-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  #feedback-section { flex: 0.8; background: var(--surface); border-left: 2px solid var(--border); padding: 20px; display: flex; flex-direction: column; justify-content: center; }
  #countdown { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); color: white; font-size: 100px; font-weight: 900; z-index: 10; }
  #timer-badge { position: absolute; top: 15px; right: 15px; background: var(--red); color: white; padding: 6px 14px; border-radius: 20px; font-size: 16px; font-weight: bold; display: none; z-index: 5; }
  .score-title { font-size: 40px; font-weight: 900; color: #ffd234; text-align: center; margin-bottom: 20px; }
  .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .check-item { background: var(--card); padding: 15px; border-radius: 15px; border: 2px solid var(--border); text-align: center; transition: 0.3s; }
  .check-item.success { border-color: var(--green); background: rgba(0, 255, 136, 0.1); }
  .item-label { font-size: 14px; color: var(--muted); margin-bottom: 8px; font-weight: bold; }
  .item-status { font-size: 26px; font-weight: 900; }
  .success .item-status { color: var(--green); }
  #footer-controls { padding: 15px; background: var(--surface); display: flex; gap: 10px; border-top: 1px solid var(--border); }
  #btn-main { flex: 2; height: 65px; border-radius: 15px; border: none; background: linear-gradient(135deg, var(--cyan), #0099bb); font-size: 22px; font-weight: 800; cursor: pointer; color: #001a22; }
  #btn-main.rec { background: var(--red); color: white; }
  #hand-select { flex: 1; background: var(--card); color: var(--cyan); border: 1px solid var(--border); padding: 10px; border-radius: 10px; font-size: 14px; font-weight: bold; }
  @media (orientation: landscape) { #main-layout { flex-direction: row; } }
</style>
</head>
<body>

<div id="header"><h1>🏸 Swing Precision Lab V10</h1></div>
<div id="main-layout">
  <div id="cam-section">
    <div id="countdown">3</div>
    <div id="timer-badge">REC 10s</div>
    <video id="video" playsinline muted autoplay></video>
    <video id="replay-video" playsinline loop></video>
    <svg id="skeleton-svg" viewBox="0 0 640 480" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div id="feedback-section">
    <div id="result-content" style="display:none;">
      <div class="score-title" id="final-score">SCORE: 0/4</div>
      <div class="check-grid">
        <div class="check-item" id="c1"><div class="item-label">1. 헤드 드롭</div><div class="item-status">미흡</div></div>
        <div class="check-item" id="c2"><div class="item-label">2. 정면 타구</div><div class="item-status">미흡</div></div>
        <div class="check-item" id="c3"><div class="item-label">3. 최고 타점</div><div class="item-status">미흡</div></div>
        <div class="check-item" id="c4"><div class="item-label">4. 반대 손</div><div class="item-status">미흡</div></div>
      </div>
    </div>
  </div>
</div>
<div id="footer-controls">
  <select id="hand-select"><option value="right">오른손잡이</option><option value="left">왼손잡이</option></select>
  <button id="btn-main" onclick="handleStart()">측정 시작</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script>
let pose, mediaRecorder, chunks = [];
let isRecording = false, isReplaying = false;
let analysis = { headDrop:false, faceFront:false, maxExtension:false, oppositeHand:false };

// ── 정밀 분석을 위한 내부 변수 ──
let swingStarted = false;
let torsoHeight = 0;

const video = document.getElementById('video');
const replayVid = document.getElementById('replay-video');
const btn = document.getElementById('btn-main');

async function init() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
  video.srcObject = stream;
  pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
  pose.onResults(onResults);
  const run = async () => { 
    const source = isReplaying ? replayVid : video;
    if (source.readyState >= 2) await pose.send({ image: source }); 
    requestAnimationFrame(run); 
  };
  video.onloadedmetadata = run;
}

function onResults(res) {
  if (!res.poseLandmarks) return;
  drawSkeleton(res.poseLandmarks);
  if (isRecording) analyzeDeep(res.poseLandmarks);
}

function analyzeDeep(lm) {
  const hand = document.getElementById('hand-select').value;
  const main = hand === 'right' ? {s:12, e:14, w:16} : {s:11, e:13, w:15};
  const opp = hand === 'right' ? {s:11, w:15} : {s:12, w:16};
  
  const shoulder = lm[main.s], elbow = lm[main.e], wrist = lm[main.w], ow = lm[opp.w];
  
  // 1. 신체 비율 계산 (몸통 길이를 기준으로 팔 뻗음 정도 판정)
  torsoHeight = Math.abs(lm[12].y - lm[24].y); 

  // 2. 스윙 시작 감지 (손목이 어깨 위로 올라가는 시점)
  if (wrist.y < shoulder.y) swingStarted = true;

  if (swingStarted) {
    // [판정 1] 헤드 드롭: 팔꿈치는 높고(어깨선 근처), 손목은 팔꿈치보다 낮아야 함 (뒤로 젖힘)
    const elbowAngle = calcAngle(shoulder, elbow, wrist);
    if (elbowAngle < 90 && elbow.y < shoulder.y + 0.1) analysis.headDrop = true;

    // [판정 2] 정면 타구: 히팅 순간 손목의 X좌표가 어깨와 거의 일치해야 함
    const hitZone = Math.abs(wrist.x - shoulder.x);
    if (hitZone < 0.1 && wrist.y < shoulder.y - 0.1) analysis.faceFront = true;

    // [판정 3] 최고 타점: 어깨-손목 거리가 몸통 길이의 70% 이상 확장되어야 함 (손가락질 방지)
    const armLength = Math.sqrt(Math.pow(wrist.x-shoulder.x,2) + Math.pow(wrist.y-shoulder.y,2));
    if (armLength > torsoHeight * 0.8) analysis.maxExtension = true;

    // [판정 4] 반대 손: 주도 손이 높을 때 반대 손도 어깨 선상에 있어야 함 (밸런스)
    if (wrist.y < shoulder.y && ow.y < lm[opp.s].y + 0.05) analysis.oppositeHand = true;
  }
}

// (이하 handleStart, startRec, showResult 등 기존 UI 로직 동일...)
function handleStart() {
  if (isReplaying) return location.reload();
  document.getElementById('result-content').style.display = 'none';
  btn.disabled = true;
  let count = 3;
  const cd = document.getElementById('countdown');
  cd.textContent = count; cd.style.display = 'flex';
  const timer = setInterval(() => {
    count--; cd.textContent = count;
    if (count === 0) { clearInterval(timer); cd.style.display = 'none'; startRec(); }
  }, 1000);
}

function startRec() {
  isRecording = true; chunks = []; swingStarted = false;
  analysis = { headDrop:false, faceFront:false, maxExtension:false, oppositeHand:false };
  mediaRecorder = new MediaRecorder(video.srcObject);
  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = showResult;
  mediaRecorder.start();
  btn.disabled = false; btn.classList.add('rec');
  document.getElementById('timer-badge').style.display = 'block';
  let timeLeft = 10;
  const recTimer = setInterval(() => {
    timeLeft--; document.getElementById('timer-badge').textContent = `REC ${timeLeft}s`;
    if (timeLeft <= 0) { clearInterval(recTimer); if(isRecording) stopRecording(); }
  }, 1000);
}

function stopRecording() { isRecording = false; mediaRecorder.stop(); }

function showResult() {
  const blob = new Blob(chunks, { type: 'video/webm' });
  replayVid.src = URL.createObjectURL(blob);
  isReplaying = true; video.style.display = 'none'; replayVid.style.display = 'block';
  replayVid.playbackRate = 0.5; replayVid.play();
  btn.textContent = "다시 측정하기"; btn.classList.remove('rec');
  document.getElementById('timer-badge').style.display = 'none';
  document.getElementById('result-content').style.display = 'block';
  const results = [analysis.headDrop, analysis.faceFront, analysis.maxExtension, analysis.oppositeHand];
  const score = results.filter(Boolean).length;
  document.getElementById('final-score').textContent = `SCORE: ${score}/4`;
  results.forEach((res, i) => {
    const el = document.getElementById(`c${i+1}`);
    el.className = res ? 'check-item success' : 'check-item';
    el.querySelector('.item-status').textContent = res ? '성공' : '미흡';
  });
}

function calcAngle(a, b, c) {
  const d1 = {x:a.x-b.x, y:a.y-b.y}, d2 = {x:c.x-b.x, y:c.y-b.y};
  const dot = d1.x*d2.x + d1.y*d2.y;
  const m = Math.sqrt(d1.x**2+d1.y**2) * Math.sqrt(d2.x**2+d2.y**2);
  return Math.acos(Math.min(1, Math.max(-1, dot/m))) * 180 / Math.PI;
}

function drawSkeleton(lm) {
  const svg = document.getElementById('skeleton-svg');
  svg.innerHTML = "";
  const pts = lm.map(l => ({ x: l.x * 640, y: l.y * 480 }));
  [[11,12],[12,14],[14,16],[11,13],[13,15],[12,24],[11,23]].forEach(([a, b]) => {
    const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
    l.setAttribute("x1", pts[a].x); l.setAttribute("y1", pts[a].y);
    l.setAttribute("x2", pts[b].x); l.setAttribute("y2", pts[b].y);
    l.setAttribute("stroke", "#00e5ff"); l.setAttribute("stroke-width", "6");
    svg.appendChild(l);
  });
}
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏸 Badminton Analyzer Pro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #060d1a; --surface: #0c1628; --card: #111e35; --border: #1c2e4a;
    --cyan: #00e5ff; --orange: #ff6b35; --green: #00ff88; --red: #ff3d5a; --text: #ddeeff; --muted: #3a5070;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 15px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
  #cam-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; overflow: hidden; }
  video, #replay-video { width: 100%; height: 100%; object-fit: cover; }
  #replay-video { display: none; }
  #skeleton-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  #timer { position: absolute; top: 10px; right: 15px; background: var(--red); color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; display: none; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .metric-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; }
  .card span { display: block; font-size: 10px; color: var(--muted); margin-bottom: 5px; }
  .card strong { font-size: 18px; color: var(--cyan); }
  #fb-panel { margin: 0 15px 20px; background: var(--card); border-left: 4px solid var(--orange); padding: 15px; border-radius: 8px; }
  #btn-main { margin: 0 15px 30px; height: 60px; border-radius: 15px; border: none; background: linear-gradient(135deg, var(--cyan), #0099bb); font-size: 18px; font-weight: 800; cursor: pointer; color: #001a22; }
  #btn-main.rec { background: var(--red); color: white; }
</style>
</head>
<body>

<div id="header">
  <div style="font-weight: 800; color: var(--cyan);">🏸 SWING ANALYZER PRO</div>
</div>

<div id="cam-wrap">
  <div id="timer">REC 00:10</div>
  <video id="video" playsinline muted autoplay></video>
  <video id="replay-video" playsinline></video>
  <svg id="skeleton-svg" viewBox="0 0 640 480"></svg>
</div>

<div class="metric-box">
  <div class="card"><span>팔꿈치</span><strong id="m-elbow">—</strong></div>
  <div class="card"><span>손목 높이</span><strong id="m-wrist">—</strong></div>
  <div class="card"><span>라켓면</span><strong id="m-face">분석중</strong></div>
</div>

<div id="fb-panel">
  <div style="font-size: 11px; color: var(--muted); margin-bottom: 5px;">AI FEEDBACK</div>
  <div id="fb-text">녹화 버튼을 눌러 10초간 스윙을 촬영하세요.</div>
</div>

<button id="btn-main" onclick="handleAction()">녹화 시작 (10초)</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script>
let pose, mediaRecorder, chunks = [];
let isRecording = false, isReplaying = false;
let sessionStats = { maxElbow: 0, maxWrist: 0 };
const video = document.getElementById('video');
const replayVid = document.getElementById('replay-video');
const btn = document.getElementById('btn-main');

async function init() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  video.srcObject = stream;

  pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
  
  // ── 카메라 인식률 최적화 설정 ──
  pose.setOptions({
    modelComplexity: 1,       // 0에서 1로 높여 정밀도 강화
    smoothLandmarks: true,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
  });

  pose.onResults(onResults);
  const run = async () => { if(!isReplaying) await pose.send({ image: video }); requestAnimationFrame(run); };
  run();
}

function onResults(res) {
  if (!res.poseLandmarks) return;
  const lm = res.poseLandmarks;
  draw(lm);
  
  const elbow = calc(lm[12], lm[14], lm[16]);
  const wristH = Math.round((1 - lm[16].y) * 100);
  
  document.getElementById('m-elbow').textContent = elbow ? Math.round(elbow) + "°" : "—";
  document.getElementById('m-wrist').textContent = wristH + "%";

  if (isRecording) {
    sessionStats.maxElbow = Math.max(sessionStats.maxElbow, elbow || 0);
    sessionStats.maxWrist = Math.max(sessionStats.maxWrist, wristH);
  }
}

function handleAction() {
  if (isReplaying) return location.reload();
  startRec();
}

function startRec() {
  isRecording = true;
  chunks = [];
  sessionStats = { maxElbow: 0, maxWrist: 0 };
  mediaRecorder = new MediaRecorder(video.srcObject);
  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = playSlowMo;
  mediaRecorder.start();
  
  btn.textContent = "녹화 중 (10초)...";
  btn.classList.add('rec');
  document.getElementById('timer').style.display = "block";
  
  setTimeout(() => { if(isRecording) mediaRecorder.stop(); isRecording = false; }, 10000);
}

function playSlowMo() {
  const blob = new Blob(chunks, { type: 'video/webm' });
  replayVid.src = URL.createObjectURL(blob);
  isReplaying = true;
  video.style.display = "none";
  replayVid.style.display = "block";
  replayVid.playbackRate = 0.5; // 0.5배속 리플레이
  replayVid.loop = true;
  replayVid.play();
  
  btn.textContent = "다시 촬영하기";
  btn.classList.remove('rec');
  document.getElementById('timer').style.display = "none";
  
  // 결과 기반 피드백
  let fb = "<b>[분석 결과]</b> ";
  if(sessionStats.maxElbow > 160) fb += "팔꿈치가 잘 펴졌습니다! ";
  else fb += "임팩트 시 팔을 더 쭉 펴주세요. ";
  if(sessionStats.maxWrist > 70) fb += "타점이 아주 높고 좋습니다. 👍";
  else fb += "더 높은 위치에서 셔틀콕을 치도록 노력해보세요.";
  
  document.getElementById('fb-text').innerHTML = fb;
}

function calc(a, b, c) {
  const d1 = {x:a.x-b.x, y:a.y-b.y}, d2 = {x:c.x-b.x, y:c.y-b.y};
  const dot = d1.x*d2.x + d1.y*d2.y;
  const m = Math.sqrt(d1.x**2+d1.y**2) * Math.sqrt(d2.x**2+d2.y**2);
  return Math.acos(Math.min(1, Math.max(-1, dot/m))) * 180 / Math.PI;
}

function draw(lm) {
  const svg = document.getElementById('skeleton-svg');
  svg.innerHTML = "";
  const pts = lm.map(l => ({ x: l.x * 640, y: l.y * 480 }));
  const connections = [[11,12],[12,14],[14,16],[11,13],[13,15]];
  connections.forEach(([a, b]) => {
    const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
    l.setAttribute("x1", pts[a].x); l.setAttribute("y1", pts[a].y);
    l.setAttribute("x2", pts[b].x); l.setAttribute("y2", pts[b].y);
    l.setAttribute("stroke", "#00e5ff"); l.setAttribute("stroke-width", "4");
    svg.appendChild(l);
  });
}

init();
</script>
</body>
</html>
